<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Food Admin Panel</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f1117;
      --surface:   #1a1d27;
      --card:      #21253a;
      --border:    #2e334d;
      --accent:    #f97316;
      --accent2:   #fb923c;
      --text:      #e8eaf0;
      --muted:     #7b82a0;
      --success:   #22c55e;
      --warning:   #eab308;
      --danger:    #ef4444;
      --info:      #3b82f6;
      --radius:    12px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── LOGIN SCREEN ── */
    #login-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: radial-gradient(ellipse at 50% 0%, #f9731620 0%, transparent 60%), var(--bg);
    }
    .login-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 48px 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 24px 64px #00000060;
    }
    .login-logo {
      font-size: 2rem;
      text-align: center;
      margin-bottom: 8px;
    }
    .login-box h2 {
      text-align: center;
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .login-sub {
      text-align: center;
      color: var(--muted);
      font-size: 0.85rem;
      margin-bottom: 32px;
    }
    .field { margin-bottom: 18px; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--muted); margin-bottom: 6px; letter-spacing: .05em; text-transform: uppercase; }
    .field input {
      width: 100%;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      color: var(--text);
      font-size: 0.95rem;
      outline: none;
      transition: border-color .2s;
    }
    .field input:focus { border-color: var(--accent); }
    .btn-login {
      width: 100%;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 13px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
      transition: background .2s, transform .1s;
    }
    .btn-login:hover { background: var(--accent2); }
    .btn-login:active { transform: scale(.98); }
    #login-error { color: var(--danger); font-size: 0.85rem; text-align: center; margin-top: 12px; min-height: 20px; }

    /* ── MAIN LAYOUT ── */
    #app { display: none; flex-direction: column; min-height: 100vh; }

    /* TOP NAV */
    nav {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 28px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
    }
    .nav-brand { display: flex; align-items: center; gap: 10px; font-size: 1.1rem; font-weight: 700; }
    .nav-brand span:first-child { font-size: 1.4rem; }
    .nav-right { display: flex; align-items: center; gap: 16px; }
    .admin-badge {
      background: linear-gradient(135deg, var(--accent), #dc2626);
      color: #fff;
      font-size: 0.72rem;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 20px;
      letter-spacing: .06em;
      text-transform: uppercase;
    }
    .btn-logout {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 7px 16px;
      border-radius: 8px;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all .2s;
    }
    .btn-logout:hover { border-color: var(--danger); color: var(--danger); }

    /* MAIN CONTENT */
    main { flex: 1; padding: 32px 28px; max-width: 1300px; width: 100%; margin: 0 auto; }

    /* STATS ROW */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
      margin-bottom: 32px;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 22px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .stat-label { font-size: 0.78rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; }
    .stat-value { font-size: 1.9rem; font-weight: 700; }
    .stat-value.orange { color: var(--accent); }
    .stat-value.green  { color: var(--success); }
    .stat-value.blue   { color: var(--info); }
    .stat-value.yellow { color: var(--warning); }

    /* ORDERS TABLE */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      flex-wrap: wrap;
      gap: 12px;
    }
    .section-header h3 { font-size: 1.1rem; font-weight: 700; }
    .controls { display: flex; gap: 10px; flex-wrap: wrap; }
    .filter-select, .search-input {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 0.88rem;
      outline: none;
      transition: border-color .2s;
    }
    .filter-select:focus, .search-input:focus { border-color: var(--accent); }
    .search-input { min-width: 200px; }
    .btn-refresh {
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 0.88rem;
      cursor: pointer;
      transition: all .2s;
    }
    .btn-refresh:hover { border-color: var(--accent); color: var(--accent); }

    .table-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    table { width: 100%; border-collapse: collapse; }
    thead { background: var(--card); }
    th {
      text-align: left;
      padding: 13px 16px;
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .06em;
      white-space: nowrap;
    }
    td { padding: 13px 16px; font-size: 0.9rem; border-top: 1px solid var(--border); vertical-align: middle; }
    tr:hover td { background: #ffffff05; }

    .order-id { font-family: monospace; font-size: 0.8rem; color: var(--muted); }

    /* STATUS BADGES */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: capitalize;
    }
    .badge::before { content: ''; width: 7px; height: 7px; border-radius: 50%; }
    .badge.pending   { background: #eab30820; color: var(--warning); }  .badge.pending::before   { background: var(--warning); }
    .badge.confirmed { background: #3b82f620; color: var(--info); }     .badge.confirmed::before { background: var(--info); }
    .badge.preparing { background: #f9731620; color: var(--accent); }   .badge.preparing::before { background: var(--accent); }
    .badge.delivered { background: #22c55e20; color: var(--success); }  .badge.delivered::before { background: var(--success); }
    .badge.cancelled { background: #ef444420; color: var(--danger); }   .badge.cancelled::before { background: var(--danger); }

    /* STATUS DROPDOWN */
    .status-select {
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 7px;
      padding: 6px 10px;
      font-size: 0.85rem;
      cursor: pointer;
      outline: none;
      transition: border-color .2s;
    }
    .status-select:hover, .status-select:focus { border-color: var(--accent); }
    .status-select:disabled { opacity: .5; cursor: not-allowed; }

    /* EMPTY / LOADING */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }
    .empty-state .icon { font-size: 3rem; margin-bottom: 12px; }
    .empty-state p { font-size: 0.9rem; }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      margin: 40px auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* TOAST */
    #toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 999; display: flex; flex-direction: column; gap: 10px; }
    .toast {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 18px;
      font-size: 0.88rem;
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 8px 24px #00000050;
      animation: slideIn .25s ease;
      min-width: 220px;
    }
    .toast.success { border-left: 3px solid var(--success); }
    .toast.error   { border-left: 3px solid var(--danger); }
    @keyframes slideIn { from { opacity:0; transform: translateY(12px); } to { opacity:1; transform: translateY(0); } }

    /* PAGINATION */
    .pagination {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      border-top: 1px solid var(--border);
      font-size: 0.85rem;
      color: var(--muted);
      flex-wrap: wrap;
      gap: 8px;
    }
    .page-btns { display: flex; gap: 6px; }
    .page-btn {
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text);
      width: 34px; height: 34px;
      border-radius: 7px;
      cursor: pointer;
      font-size: 0.88rem;
      transition: all .2s;
      display: flex; align-items: center; justify-content: center;
    }
    .page-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
    .page-btn:disabled { opacity: .4; cursor: not-allowed; }
    .page-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    @media (max-width: 700px) {
      nav { padding: 0 16px; }
      main { padding: 20px 16px; }
      .search-input { min-width: 140px; }
      td, th { padding: 10px 10px; }
    }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">🍽️</div>
    <h2>Admin Panel</h2>
    <p class="login-sub">Food Order Management System</p>
    <div class="field">
      <label>Email</label>
      <input type="email" id="email" placeholder="admin@example.com" autocomplete="username"/>
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"/>
    </div>
    <button class="btn-login" onclick="login()">Sign In →</button>
    <div id="login-error"></div>
  </div>
</div>

<!-- MAIN APP -->
<div id="app">
  <nav>
    <div class="nav-brand">
      <span>🍽️</span>
      <span>FoodAdmin</span>
    </div>
    <div class="nav-right">
      <span class="admin-badge">⚡ Admin</span>
      <span id="admin-email" style="color:var(--muted);font-size:.85rem;"></span>
      <button class="btn-logout" onclick="logout()">Sign Out</button>
    </div>
  </nav>

  <main>
    <!-- STATS -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">Total Orders</div>
        <div class="stat-value orange" id="stat-total">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Pending</div>
        <div class="stat-value yellow" id="stat-pending">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Preparing</div>
        <div class="stat-value blue" id="stat-preparing">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Delivered</div>
        <div class="stat-value green" id="stat-delivered">—</div>
      </div>
    </div>

    <!-- ORDERS TABLE -->
    <div class="section-header">
      <h3>📋 All Orders</h3>
      <div class="controls">
        <input class="search-input" type="text" id="search" placeholder="🔍 Search by name / email…" oninput="filterOrders()"/>
        <select class="filter-select" id="status-filter" onchange="filterOrders()">
          <option value="">All Statuses</option>
          <option value="pending">Pending</option>
          <option value="confirmed">Confirmed</option>
          <option value="preparing">Preparing</option>
          <option value="delivered">Delivered</option>
          <option value="cancelled">Cancelled</option>
        </select>
        <button class="btn-refresh" onclick="loadOrders()">↻ Refresh</button>
      </div>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Order ID</th>
            <th>Customer</th>
            <th>Items</th>
            <th>Total</th>
            <th>Status</th>
            <th>Update Status</th>
            <th>Date</th>
          </tr>
        </thead>
        <tbody id="orders-body"></tbody>
      </table>
      <div id="table-state"></div>
      <div class="pagination" id="pagination" style="display:none;">
        <span id="page-info">Showing 0 orders</span>
        <div class="page-btns" id="page-btns"></div>
      </div>
    </div>
  </main>
</div>

<!-- TOAST -->
<div id="toast-container"></div>

<!-- SUPABASE -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const SUPABASE_URL  = 'https://ksmyrjbwvxbccyvbdyky.supabase.co';
  const SUPABASE_KEY  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtzbXlyamJ3dnhiY2N5dmJkeWt5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzOTk4MDAsImV4cCI6MjA5Nzk3NTgwMH0.0dRboHi83VPrBJzvnyxfRAB7hG6-md3D3fSRNw35V2s';
  const supabase      = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  const PAGE_SIZE = 15;
  let allOrders   = [];
  let filtered    = [];
  let currentPage = 1;

  /* ── AUTH ── */
  async function login() {
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const errEl    = document.getElementById('login-error');
    errEl.textContent = '';

    if (!email || !password) { errEl.textContent = 'Email aur password dono bharein.'; return; }

    const btn = document.querySelector('.btn-login');
    btn.textContent = 'Signing in…'; btn.disabled = true;

    const { data, error } = await supabase.auth.signInWithPassword({ email, password });
    if (error) { errEl.textContent = error.message; btn.textContent = 'Sign In →'; btn.disabled = false; return; }

    // check admin
    const { data: profile } = await supabase.from('profiles').select('is_admin').eq('id', data.user.id).single();
    if (!profile?.is_admin) {
      await supabase.auth.signOut();
      errEl.textContent = '⛔ Admin access nahi hai is account ko.';
      btn.textContent = 'Sign In →'; btn.disabled = false;
      return;
    }

    showApp(data.user);
  }

  async function logout() {
    await supabase.auth.signOut();
    document.getElementById('app').style.display = 'none';
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('password').value = '';
  }

  function showApp(user) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    document.getElementById('admin-email').textContent = user.email;
    loadOrders();
  }

  // auto-restore session
  supabase.auth.getSession().then(async ({ data: { session } }) => {
    if (session) {
      const { data: profile } = await supabase.from('profiles').select('is_admin').eq('id', session.user.id).single();
      if (profile?.is_admin) showApp(session.user);
    }
  });

  /* ── ORDERS ── */
  async function loadOrders() {
    showLoading();
    const { data, error } = await supabase
      .from('orders')
      .select('*')
      .order('created_at', { ascending: false });

    if (error) { showEmpty('❌ Orders load nahi hui: ' + error.message); return; }

    allOrders = data || [];
    updateStats();
    filterOrders();
  }

  function updateStats() {
    const count = s => allOrders.filter(o => o.status === s).length;
    document.getElementById('stat-total').textContent     = allOrders.length;
    document.getElementById('stat-pending').textContent   = count('pending');
    document.getElementById('stat-preparing').textContent = count('preparing');
    document.getElementById('stat-delivered').textContent = count('delivered');
  }

  function filterOrders() {
    const q   = document.getElementById('search').value.toLowerCase();
    const st  = document.getElementById('status-filter').value;
    filtered  = allOrders.filter(o => {
      const matchQ  = !q  || (o.customer_name||'').toLowerCase().includes(q) || (o.customer_email||'').toLowerCase().includes(q) || o.id.toLowerCase().includes(q);
      const matchSt = !st || o.status === st;
      return matchQ && matchSt;
    });
    currentPage = 1;
    renderPage();
  }

  function renderPage() {
    const tbody = document.getElementById('orders-body');
    const start = (currentPage - 1) * PAGE_SIZE;
    const slice = filtered.slice(start, start + PAGE_SIZE);

    if (filtered.length === 0) { showEmpty('🛒 Koi order nahi mili.'); return; }

    document.getElementById('table-state').innerHTML = '';
    tbody.innerHTML = slice.map(order => `
      <tr>
        <td><span class="order-id">#${order.id.slice(0,8)}…</span></td>
        <td>
          <div style="font-weight:600;">${esc(order.customer_name || '—')}</div>
          <div style="font-size:.78rem;color:var(--muted);">${esc(order.customer_email || '')}</div>
        </td>
        <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${esc(order.items||'')}">
          ${esc(order.items || '—')}
        </td>
        <td style="font-weight:700;color:var(--accent);">
          ${order.total_amount != null ? '₹' + Number(order.total_amount).toFixed(2) : '—'}
        </td>
        <td><span class="badge ${order.status||'pending'}">${order.status||'pending'}</span></td>
        <td>
          <select class="status-select" onchange="updateStatus('${order.id}', this)" data-id="${order.id}">
            ${['pending','confirmed','preparing','delivered','cancelled'].map(s =>
              `<option value="${s}" ${order.status===s?'selected':''}>${capitalize(s)}</option>`
            ).join('')}
          </select>
        </td>
        <td style="color:var(--muted);font-size:.82rem;white-space:nowrap;">
          ${order.created_at ? new Date(order.created_at).toLocaleString('en-IN',{dateStyle:'medium',timeStyle:'short'}) : '—'}
        </td>
      </tr>
    `).join('');

    renderPagination();
  }

  function renderPagination() {
    const totalPages = Math.ceil(filtered.length / PAGE_SIZE);
    const pg = document.getElementById('pagination');
    const start = (currentPage-1)*PAGE_SIZE+1;
    const end   = Math.min(currentPage*PAGE_SIZE, filtered.length);
    document.getElementById('page-info').textContent = `Showing ${start}–${end} of ${filtered.length} orders`;

    const btns = document.getElementById('page-btns');
    btns.innerHTML = `<button class="page-btn" onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''}>‹</button>`;
    for (let i = 1; i <= totalPages; i++) {
      if (totalPages > 7 && i > 2 && i < totalPages-1 && Math.abs(i-currentPage) > 1) {
        if (i === 3 || i === totalPages-2) btns.innerHTML += `<span style="color:var(--muted);padding:0 4px;">…</span>`;
        continue;
      }
      btns.innerHTML += `<button class="page-btn ${i===currentPage?'active':''}" onclick="goPage(${i})">${i}</button>`;
    }
    btns.innerHTML += `<button class="page-btn" onclick="goPage(${currentPage+1})" ${currentPage===totalPages?'disabled':''}>›</button>`;
    pg.style.display = 'flex';
  }

  function goPage(p) {
    const max = Math.ceil(filtered.length / PAGE_SIZE);
    if (p < 1 || p > max) return;
    currentPage = p;
    renderPage();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  /* ── UPDATE STATUS ── */
  async function updateStatus(orderId, selectEl) {
    const newStatus = selectEl.value;
    selectEl.disabled = true;

    const { error } = await supabase
      .from('orders')
      .update({ status: newStatus })
      .eq('id', orderId);

    if (error) {
      toast('❌ Update failed: ' + error.message, 'error');
      selectEl.disabled = false;
      return;
    }

    // update local data
    const idx = allOrders.findIndex(o => o.id === orderId);
    if (idx !== -1) allOrders[idx].status = newStatus;
    updateStats();

    // update badge in same row
    const row = selectEl.closest('tr');
    const badge = row.querySelector('.badge');
    badge.className = `badge ${newStatus}`;
    badge.textContent = capitalize(newStatus);

    toast(`✅ Order status updated to "${capitalize(newStatus)}"`, 'success');
    selectEl.disabled = false;
  }

  /* ── UI HELPERS ── */
  function showLoading() {
    document.getElementById('orders-body').innerHTML = '';
    document.getElementById('pagination').style.display = 'none';
    document.getElementById('table-state').innerHTML = '<div class="spinner"></div>';
  }
  function showEmpty(msg) {
    document.getElementById('orders-body').innerHTML = '';
    document.getElementById('pagination').style.display = 'none';
    document.getElementById('table-state').innerHTML = `<div class="empty-state"><div class="icon">📭</div><p>${msg}</p></div>`;
  }
  function esc(str) { return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function capitalize(s) { return s.charAt(0).toUpperCase() + s.slice(1); }

  function toast(msg, type='success') {
    const el = document.createElement('div');
    el.className = `toast ${type}`;
    el.textContent = msg;
    document.getElementById('toast-container').appendChild(el);
    setTimeout(() => el.remove(), 3500);
  }
</script>
</body>
</html>
