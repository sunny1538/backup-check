<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zaika — my orders</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap');

:root{
  --ink:#1F1B16; --paper:#FFFBF5; --paper-dim:#F4EEE2;
  --turmeric:#E8A33D; --chili:#C84B31;
  --line:#E4DACA; --text:#2B2520; --text-soft:#766C5C;
  --font-display:'Space Grotesk',sans-serif; --font-body:'Inter',sans-serif; --font-mono:'IBM Plex Mono',monospace;
}
*{box-sizing:border-box;}
body{margin:0; background:var(--paper); color:var(--text); font-family:var(--font-body);}

.topbar{
  background:var(--ink); color:var(--paper);
  display:flex; align-items:center; justify-content:space-between;
  padding:18px 28px;
}
.brand{font-family:var(--font-display); font-weight:700; font-size:22px;}
.brand .dot{color:var(--turmeric);}
.topbar nav a{
  color:#D8D1C2; text-decoration:none; margin-right:20px; font-size:14px;
  border-bottom:2px solid transparent; padding-bottom:2px;
}
.topbar nav a.active{color:var(--paper); border-color:var(--turmeric);}
.user-chip{font-family:var(--font-mono); font-size:13px; display:flex; gap:10px; align-items:center;}
.user-chip a{color:#D8D1C2; text-decoration:underline; cursor:pointer;}

.shell{max-width:720px; margin:0 auto; padding:36px 24px 80px;}
.section-label{
  font-family:var(--font-mono); font-size:12px; letter-spacing:.06em; text-transform:uppercase;
  color:var(--text-soft); margin:0 0 6px;
}
.section-title{font-family:var(--font-display); font-weight:700; font-size:28px; margin:0 0 26px;}

.order-card{
  background:#fff; border:1px solid var(--line); border-radius:14px; margin-bottom:16px; overflow:hidden;
}
.order-head{
  display:flex; justify-content:space-between; align-items:center;
  padding:16px 20px; border-bottom:1px dashed var(--line);
}
.order-id{font-family:var(--font-mono); font-size:13px; color:var(--text-soft); margin:0;}
.order-date{font-size:12px; color:var(--text-soft); margin:4px 0 0;}
.order-body{padding:16px 20px; font-size:14px;}
.order-foot{
  display:flex; justify-content:space-between; align-items:center;
  padding:14px 20px 18px; border-top:1px dashed var(--line);
}
.order-total{font-family:var(--font-mono); font-weight:600; font-size:15px;}
.order-otp{font-size:12px; color:var(--text-soft);}
.order-otp b{font-family:var(--font-mono); color:var(--text); font-size:13px;}

.status-pill{
  font-family:var(--font-mono); font-size:11px; text-transform:uppercase;
  padding:4px 10px; border-radius:20px;
}
.status-pending{background:#FCEBEB; color:#A32D2D;}
.status-progress{background:#FAEEDA; color:#854F0B;}
.status-delivered{background:#EAF3DE; color:#3B6D11;}

.empty-note{
  text-align:center; padding:50px 0; color:var(--text-soft); font-size:14px;
}
.empty-note a{color:var(--chili); font-weight:600;}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand"><span class="dot">●</span>zaika</div>
  <nav>
    <a href="index.html">Menu</a>
    <a href="order-history.html" class="active">My orders</a>
  </nav>
  <div class="user-chip">
    <span id="user-email-chip"></span>
    <a id="logout-link">Log out</a>
  </div>
</div>

<div class="shell">
  <p class="section-label">Your orders</p>
  <h1 class="section-title">Order history</h1>
  <div id="orders-list"></div>
</div>

<script>
const SUPABASE_URL = "https://cwhtmomweslynqyjildp.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN3aHRtb213ZXNseW5xeWppbGRwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIxMjA1MTgsImV4cCI6MjA5NzY5NjUxOH0.W6WtVBsNspCjZUIcj55t7DoxhtxVljftT4oZqjXmiu8";
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

function statusClass(status){
  if (status === "delivered") return "status-delivered";
  if (status === "out for delivery") return "status-progress";
  return "status-pending";
}

async function loadOrders(){
  const { data, error } = await supabase
    .from('orders')
    .select('*')
    .order('created_at', { ascending: false });

  const list = document.getElementById('orders-list');

  if (error){
    list.innerHTML = `<p class="empty-note">Could not load orders: ${error.message}</p>`;
    return;
  }
  if (!data || data.length === 0){
    list.innerHTML = '<p class="empty-note">No orders yet. <a href="index.html">Go order something →</a></p>';
    return;
  }

  list.innerHTML = data.map(o => `
    <div class="order-card">
      <div class="order-head">
        <div>
          <p class="order-id">Order #${o.id}</p>
          <p class="order-date">${new Date(o.created_at).toLocaleString()}</p>
        </div>
        <span class="status-pill ${statusClass(o.status)}">${o.status}</span>
      </div>
      <div class="order-body">${o.items}</div>
      <div class="order-foot">
        <span class="order-total">₹${o.total_amount}</span>
        <span class="order-otp">Delivery OTP: <b>${o.otp}</b></span>
      </div>
    </div>
  `).join('');
}

document.getElementById('logout-link').addEventListener('click', async () => {
  await supabase.auth.signOut();
  location.href = 'index.html';
});

(async () => {
  const { data } = await supabase.auth.getSession();
  if (!data.session){
    location.href = 'index.html';
    return;
  }
  document.getElementById('user-email-chip').textContent = data.session.user.email;
  loadOrders();
})();
</script>
</body>
</html>
