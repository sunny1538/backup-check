<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Orders — Zaika</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0f0e0d; --surface: #1a1815; --card: #221f1b; --border: #2e2a24;
      --orange: #f97316; --orange-dim: #c2540a; --gold: #f5c842;
      --text: #f0ebe3; --muted: #8a8070; --success: #22c55e; --radius: 16px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; }

    nav { display: flex; align-items: center; justify-content: space-between; padding: 16px 24px; background: var(--surface); border-bottom: 1px solid var(--border); }
    .nav-logo { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800; color: var(--orange); text-decoration: none; }
    .nav-logo span { color: var(--gold); }
    .btn { padding: 9px 18px; border-radius: 10px; border: none; font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; text-decoration: none; display: inline-block; }
    .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
    .btn-ghost:hover { color: var(--text); border-color: var(--muted); }
    .btn-orange { background: var(--orange); color: #fff; }
    .btn-orange:hover { background: var(--orange-dim); }

    .page-header { padding: 48px 24px 24px; }
    .page-header h1 { font-family: 'Syne', sans-serif; font-size: 36px; font-weight: 800; }
    .page-header p { color: var(--muted); margin-top: 8px; font-size: 15px; }

    .orders-list { padding: 0 24px 80px; display: flex; flex-direction: column; gap: 16px; max-width: 720px; }

    /* TICKET CARD */
    .order-ticket {
      background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
      overflow: hidden; position: relative;
    }
    .ticket-header { padding: 18px 20px; display: flex; justify-content: space-between; align-items: flex-start; border-bottom: 1px dashed var(--border); }
    .ticket-id { font-family: 'Syne', sans-serif; font-size: 13px; color: var(--muted); font-weight: 600; letter-spacing: 1px; text-transform: uppercase; }
    .ticket-date { font-size: 12px; color: var(--muted); margin-top: 4px; }
    .ticket-status { font-size: 12px; font-weight: 700; padding: 4px 12px; border-radius: 20px; text-transform: uppercase; letter-spacing: 0.5px; }
    .status-confirmed { background: rgba(249,115,22,0.15); color: var(--orange); border: 1px solid rgba(249,115,22,0.3); }
    .status-preparing { background: rgba(245,200,66,0.15); color: var(--gold); border: 1px solid rgba(245,200,66,0.3); }
    .status-delivered { background: rgba(34,197,94,0.15); color: var(--success); border: 1px solid rgba(34,197,94,0.2); }

    .ticket-items { padding: 16px 20px; display: flex; flex-direction: column; gap: 10px; }
    .ticket-item { display: flex; align-items: center; gap: 12px; }
    .item-emoji { font-size: 24px; flex-shrink: 0; }
    .item-info { flex: 1; }
    .item-name { font-size: 14px; font-weight: 600; }
    .item-qty { font-size: 12px; color: var(--muted); }
    .item-price { font-size: 14px; font-weight: 700; color: var(--orange); font-family: 'Syne', sans-serif; }

    .ticket-footer { padding: 14px 20px; background: rgba(249,115,22,0.06); border-top: 1px dashed var(--border); display: flex; justify-content: space-between; align-items: center; }
    .ticket-label { font-size: 12px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
    .ticket-total { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800; color: var(--text); }
    .ticket-total span { color: var(--orange); }

    /* Perforation dots */
    .ticket-dots { position: absolute; left: -8px; right: -8px; height: 0; top: 68px; display: flex; justify-content: space-between; }
    .dot { width: 16px; height: 16px; background: var(--bg); border-radius: 50%; flex-shrink: 0; }

    /* EMPTY STATE */
    .empty { text-align: center; padding: 80px 24px; }
    .empty-icon { font-size: 64px; margin-bottom: 20px; }
    .empty h2 { font-family: 'Syne', sans-serif; font-size: 24px; font-weight: 800; margin-bottom: 10px; }
    .empty p { color: var(--muted); font-size: 15px; margin-bottom: 24px; }

    /* AUTH WALL */
    .auth-wall { text-align: center; padding: 100px 24px; }
    .auth-wall .icon { font-size: 56px; margin-bottom: 20px; }
    .auth-wall h2 { font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 800; margin-bottom: 12px; }
    .auth-wall p { color: var(--muted); font-size: 15px; margin-bottom: 28px; max-width: 340px; margin-inline: auto; }

    /* LOADING */
    .loading { text-align: center; padding: 60px; color: var(--muted); }
    .loading-ring { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--orange); border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 480px) {
      .page-header { padding: 32px 16px 16px; }
      .orders-list { padding: 0 16px 60px; }
    }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">Zaika<span>·</span></a>
  <div style="display:flex;gap:10px;align-items:center">
    <a href="index.html" class="btn btn-ghost">← Menu</a>
    <button class="btn btn-ghost" id="logout-btn" style="display:none" onclick="logout()">Logout</button>
  </div>
</nav>

<div id="main-content">
  <div class="loading">
    <div class="loading-ring"></div>
    <p>Loading your orders…</p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const SUPABASE_URL = 'https://gunntdbqklfonflzwawf.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd1bm50ZGJxa2xmb25mbHp3YXdmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE4MDk2MjAsImV4cCI6MjA5NzM4NTYyMH0.ClOh1How1m7h_ioRyCwExvvkP8un6SgoMbYoFkwJFm0';
  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  async function logout() {
    await sb.auth.signOut();
    window.location.href = 'index.html';
  }

  function formatDate(iso) {
    const d = new Date(iso);
    return d.toLocaleDateString('en-IN', { day:'numeric', month:'short', year:'numeric' })
      + ' · ' + d.toLocaleTimeString('en-IN', { hour:'2-digit', minute:'2-digit' });
  }

  function statusClass(s) {
    return { confirmed: 'status-confirmed', preparing: 'status-preparing', delivered: 'status-delivered' }[s] || 'status-confirmed';
  }

  function renderOrders(orders) {
    const main = document.getElementById('main-content');
    if (orders.length === 0) {
      main.innerHTML = `
        <div class="empty">
          <div class="empty-icon">🛍️</div>
          <h2>No orders yet</h2>
          <p>You haven't placed any orders. Go explore the menu!</p>
          <a href="index.html" class="btn btn-orange">Browse Menu →</a>
        </div>`;
      return;
    }
    main.innerHTML = `
      <div class="page-header">
        <h1>My Orders</h1>
        <p>${orders.length} order${orders.length !== 1 ? 's' : ''} placed</p>
      </div>
      <div class="orders-list">
        ${orders.map(order => `
          <div class="order-ticket">
            <div class="ticket-header">
              <div>
                <div class="ticket-id">#${order.id.slice(0,8).toUpperCase()}</div>
                <div class="ticket-date">${formatDate(order.created_at)}</div>
              </div>
              <span class="ticket-status ${statusClass(order.status)}">${order.status}</span>
            </div>
            <div class="ticket-items">
              ${order.items.map(item => `
                <div class="ticket-item">
                  <span class="item-emoji">${item.emoji}</span>
                  <div class="item-info">
                    <div class="item-name">${item.name}</div>
                    <div class="item-qty">× ${item.qty}</div>
                  </div>
                  <div class="item-price">₹${item.price * item.qty}</div>
                </div>`).join('')}
            </div>
            <div class="ticket-footer">
              <span class="ticket-label">Total Paid</span>
              <div class="ticket-total">₹<span>${order.total}</span></div>
            </div>
          </div>`).join('')}
      </div>`;
  }

  async function init() {
    const { data: { session } } = await sb.auth.getSession();
    const user = session?.user;
    const main = document.getElementById('main-content');

    if (!user) {
      main.innerHTML = `
        <div class="auth-wall">
          <div class="icon">🔐</div>
          <h2>Sign in to view orders</h2>
          <p>Your order history is private. Please log in to see your past orders.</p>
          <a href="index.html" class="btn btn-orange">Go to Menu & Sign In →</a>
        </div>`;
      return;
    }

    document.getElementById('logout-btn').style.display = 'block';

    const { data: orders, error } = await supabase
      .from('orders')
      .select('*')
      .eq('user_id', user.id)
      .order('created_at', { ascending: false });

    if (error) {
      main.innerHTML = `<div class="empty"><div class="empty-icon">⚠️</div><h2>Error loading orders</h2><p>${error.message}</p></div>`;
      return;
    }
    renderOrders(orders);
  }

  init();
</script>
</body>
</html>
