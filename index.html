<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Zaika Cloud Kitchen</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0f0e0d;
      --surface: #1a1815;
      --card: #221f1b;
      --border: #2e2a24;
      --orange: #f97316;
      --orange-dim: #c2540a;
      --gold: #f5c842;
      --text: #f0ebe3;
      --muted: #8a8070;
      --success: #22c55e;
      --radius: 16px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; }

    /* ── NAV ── */
    nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 24px; background: var(--surface);
      border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100;
    }
    .nav-logo { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800; color: var(--orange); letter-spacing: -0.5px; }
    .nav-logo span { color: var(--gold); }
    .nav-right { display: flex; gap: 12px; align-items: center; }
    .btn { padding: 9px 18px; border-radius: 10px; border: none; font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
    .btn-ghost:hover { color: var(--text); border-color: var(--muted); }
    .btn-orange { background: var(--orange); color: #fff; }
    .btn-orange:hover { background: var(--orange-dim); transform: translateY(-1px); }
    .btn-outline { background: transparent; color: var(--orange); border: 1.5px solid var(--orange); }
    .btn-outline:hover { background: var(--orange); color: #fff; }
    #user-info { font-size: 13px; color: var(--muted); max-width: 160px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* ── HERO ── */
    .hero {
      text-align: center; padding: 64px 24px 48px;
      background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(249,115,22,0.12) 0%, transparent 70%);
    }
    .hero-tag { display: inline-block; background: rgba(249,115,22,0.15); color: var(--orange); font-size: 12px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; padding: 6px 14px; border-radius: 20px; margin-bottom: 20px; border: 1px solid rgba(249,115,22,0.3); }
    .hero h1 { font-family: 'Syne', sans-serif; font-size: clamp(36px, 8vw, 72px); font-weight: 800; line-height: 1.05; color: var(--text); }
    .hero h1 em { color: var(--orange); font-style: normal; }
    .hero p { color: var(--muted); font-size: 16px; margin-top: 16px; max-width: 480px; margin-inline: auto; line-height: 1.6; }

    /* ── CATEGORIES ── */
    .categories { display: flex; gap: 10px; overflow-x: auto; padding: 0 24px 24px; scrollbar-width: none; }
    .categories::-webkit-scrollbar { display: none; }
    .cat-btn { flex-shrink: 0; padding: 8px 18px; border-radius: 20px; border: 1.5px solid var(--border); background: var(--card); color: var(--muted); font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
    .cat-btn.active, .cat-btn:hover { border-color: var(--orange); color: var(--orange); background: rgba(249,115,22,0.08); }

    /* ── MENU GRID ── */
    .section-label { font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 600; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; padding: 0 24px 16px; }
    .menu-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; padding: 0 24px 32px; }
    .food-card {
      background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 20px; display: flex; flex-direction: column; gap: 12px;
      transition: border-color 0.2s, transform 0.2s;
    }
    .food-card:hover { border-color: var(--orange); transform: translateY(-2px); }
    .food-emoji { font-size: 48px; line-height: 1; }
    .food-name { font-family: 'Syne', sans-serif; font-size: 17px; font-weight: 700; color: var(--text); }
    .food-desc { font-size: 13px; color: var(--muted); line-height: 1.5; }
    .food-footer { display: flex; justify-content: space-between; align-items: center; margin-top: auto; }
    .food-price { font-size: 18px; font-weight: 700; color: var(--orange); font-family: 'Syne', sans-serif; }
    .add-btn { width: 36px; height: 36px; border-radius: 50%; border: none; background: var(--orange); color: #fff; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; font-weight: 300; }
    .add-btn:hover { background: var(--orange-dim); transform: scale(1.1); }
    .qty-control { display: flex; align-items: center; gap: 10px; }
    .qty-control button { width: 30px; height: 30px; border-radius: 50%; border: 1.5px solid var(--border); background: var(--surface); color: var(--text); font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
    .qty-control button:hover { border-color: var(--orange); color: var(--orange); }
    .qty-num { font-weight: 700; font-size: 16px; min-width: 20px; text-align: center; color: var(--orange); }

    /* ── CART ── */
    .cart-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: var(--surface); border-top: 1px solid var(--border);
      padding: 16px 24px; display: flex; align-items: center; justify-content: space-between;
      z-index: 200; transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
    }
    .cart-bar.visible { transform: translateY(0); }
    .cart-info { display: flex; flex-direction: column; gap: 2px; }
    .cart-count { font-size: 12px; color: var(--muted); font-weight: 500; }
    .cart-total { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 800; color: var(--text); }
    .cart-total span { color: var(--orange); }

    /* ── AUTH MODAL ── */
    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 300; display: none; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
    .overlay.show { display: flex; }
    .modal { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 32px; width: 100%; max-width: 400px; margin: 16px; }
    .modal h2 { font-family: 'Syne', sans-serif; font-size: 24px; font-weight: 800; margin-bottom: 8px; }
    .modal p { color: var(--muted); font-size: 14px; margin-bottom: 24px; line-height: 1.5; }
    .input-group { margin-bottom: 16px; }
    .input-group label { display: block; font-size: 12px; font-weight: 600; color: var(--muted); margin-bottom: 8px; letter-spacing: 0.5px; text-transform: uppercase; }
    .input-group input { width: 100%; padding: 12px 16px; background: var(--surface); border: 1.5px solid var(--border); border-radius: 10px; color: var(--text); font-size: 15px; font-family: 'Inter', sans-serif; outline: none; transition: border-color 0.2s; }
    .input-group input:focus { border-color: var(--orange); }
    .input-group input::placeholder { color: var(--muted); }
    .modal-actions { display: flex; flex-direction: column; gap: 10px; margin-top: 8px; }
    .modal-actions .btn { width: 100%; padding: 13px; font-size: 15px; border-radius: 12px; }
    .modal-close { float: right; background: none; border: none; color: var(--muted); font-size: 22px; cursor: pointer; line-height: 1; margin-top: -4px; }
    .modal-close:hover { color: var(--text); }
    .msg { font-size: 13px; padding: 10px 14px; border-radius: 8px; margin-top: 12px; display: none; }
    .msg.success { background: rgba(34,197,94,0.1); color: var(--success); border: 1px solid rgba(34,197,94,0.2); display: block; }
    .msg.error { background: rgba(239,68,68,0.1); color: #f87171; border: 1px solid rgba(239,68,68,0.2); display: block; }

    /* ── ORDER SUCCESS TOAST ── */
    .toast {
      position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(20px);
      background: var(--success); color: #fff; padding: 14px 24px; border-radius: 12px;
      font-weight: 600; font-size: 14px; z-index: 500; opacity: 0; transition: all 0.3s; white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── AUTH TABS ── */
    .auth-tabs { display: flex; gap: 4px; margin-bottom: 24px; background: var(--surface); border-radius: 10px; padding: 4px; }
    .auth-tab { flex: 1; padding: 9px; border: none; background: transparent; color: var(--muted); font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; border-radius: 7px; transition: all 0.2s; }
    .auth-tab.active { background: var(--orange); color: #fff; }

    /* ── SPINNER ── */
    .spinner { width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.6s linear infinite; display: inline-block; vertical-align: middle; margin-right: 8px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 480px) {
      .hero { padding: 40px 16px 32px; }
      .menu-grid { grid-template-columns: 1fr; padding: 0 16px 32px; }
      .categories { padding: 0 16px 20px; }
    }
  </style>
</head>
<body>

<!-- NAV -->
<nav>
  <div class="nav-logo">Zaika<span>·</span></div>
  <div class="nav-right">
    <span id="user-info"></span>
    <a href="order-history.html" class="btn btn-ghost" id="history-btn" style="display:none;text-decoration:none">My Orders</a>
    <button class="btn btn-orange" id="auth-btn" onclick="openAuth()">Sign In</button>
    <button class="btn btn-ghost" id="logout-btn" style="display:none" onclick="logout()">Logout</button>
  </div>
</nav>

<!-- HERO -->
<section class="hero">
  <div class="hero-tag">🔥 Cloud Kitchen · Fresh Daily</div>
  <h1>Craving something <em>real?</em></h1>
  <p>Handcrafted dishes, straight from our kitchen to your door. No shortcuts, just flavor.</p>
</section>

<!-- CATEGORIES -->
<div class="categories" id="categories"></div>

<!-- SECTION LABEL -->
<div class="section-label" id="section-label">All Items</div>

<!-- MENU -->
<div class="menu-grid" id="menu-grid"></div>

<!-- CART BAR -->
<div class="cart-bar" id="cart-bar">
  <div class="cart-info">
    <span class="cart-count" id="cart-count">0 items</span>
    <div class="cart-total">₹<span id="cart-total">0</span></div>
  </div>
  <button class="btn btn-orange" onclick="placeOrder()">Place Order →</button>
</div>

<!-- AUTH MODAL -->
<div class="overlay" id="auth-overlay">
  <div class="modal">
    <button class="modal-close" onclick="closeAuth()">×</button>

    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-login" onclick="switchTab('login')">Login</button>
      <button class="auth-tab" id="tab-register" onclick="switchTab('register')">Register</button>
    </div>

    <!-- LOGIN -->
    <div id="panel-login">
      <h2>Welcome back 👋</h2>
      <div class="input-group">
        <label>Email</label>
        <input type="email" id="login-email" placeholder="you@example.com" />
      </div>
      <div class="input-group">
        <label>Password</label>
        <input type="password" id="login-password" placeholder="Your password" />
      </div>
      <div class="modal-actions">
        <button class="btn btn-orange" onclick="doLogin()"><span id="login-loader"></span>Login</button>
      </div>
      <div class="msg" id="login-msg"></div>
    </div>

    <!-- REGISTER -->
    <div id="panel-register" style="display:none">
      <h2>Create account 🍽️</h2>
      <div class="input-group">
        <label>Email</label>
        <input type="email" id="reg-email" placeholder="you@example.com" />
      </div>
      <div class="input-group">
        <label>Password</label>
        <input type="password" id="reg-password" placeholder="Min. 6 characters" />
      </div>
      <div class="input-group">
        <label>Confirm Password</label>
        <input type="password" id="reg-confirm" placeholder="Repeat password" />
      </div>
      <div class="modal-actions">
        <button class="btn btn-orange" onclick="doRegister()"><span id="reg-loader"></span>Create Account</button>
      </div>
      <div class="msg" id="reg-msg"></div>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  // ── CONFIG ──
  const SUPABASE_URL = 'https://cwhtmomweslynqyjildp.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN3aHRtb213ZXNseW5xeWppbGRwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIxMjA1MTgsImV4cCI6MjA5NzY5NjUxOH0.W6WtVBsNspCjZUIcj55t7DoxhtxVljftT4oZqjXmiu8';
  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  // ── MENU DATA ──
  const MENU = [
    { id:1, name:'Butter Chicken', emoji:'🍗', price:220, desc:'Tender chicken in rich, creamy tomato gravy.', cat:'Non-Veg' },
    { id:2, name:'Paneer Tikka', emoji:'🧀', price:180, desc:'Smoky marinated paneer with mint chutney.', cat:'Veg' },
    { id:3, name:'Dal Makhani', emoji:'🫘', price:150, desc:'Slow-cooked black lentils in butter & cream.', cat:'Veg' },
    { id:4, name:'Chicken Biryani', emoji:'🍚', price:260, desc:'Fragrant basmati with spiced chicken & saffron.', cat:'Non-Veg' },
    { id:5, name:'Chole Bhature', emoji:'🫓', price:130, desc:'Spiced chickpeas with fluffy fried bread.', cat:'Veg' },
    { id:6, name:'Mutton Rogan Josh', emoji:'🍖', price:310, desc:'Slow-cooked mutton in aromatic Kashmiri spices.', cat:'Non-Veg' },
    { id:7, name:'Veg Thali', emoji:'🍱', price:200, desc:'Dal, sabzi, roti, rice, pickle & papad.', cat:'Veg' },
    { id:8, name:'Fish Curry', emoji:'🐟', price:280, desc:'Coastal-style fish in tangy coconut gravy.', cat:'Non-Veg' },
    { id:9, name:'Masala Chai', emoji:'☕', price:40, desc:'Strong ginger-cardamom tea, the Indian way.', cat:'Drinks' },
    { id:10, name:'Mango Lassi', emoji:'🥭', price:80, desc:'Thick, sweet yoghurt drink with Alphonso mango.', cat:'Drinks' },
    { id:11, name:'Gulab Jamun', emoji:'🍡', price:70, desc:'Soft milk dumplings in rose-scented syrup.', cat:'Desserts' },
    { id:12, name:'Kulfi', emoji:'🍦', price:90, desc:'Dense pistachio ice cream on a stick.', cat:'Desserts' },
  ];

  const CATS = ['All', ...new Set(MENU.map(m => m.cat))];
  let cart = {};
  let activeCategory = 'All';
  let currentUser = null;

  // ── AUTH STATE ──
  sb.auth.onAuthStateChange((event, session) => {
    currentUser = session?.user || null;
    updateNavUI();
  });

  function updateNavUI() {
    const authBtn = document.getElementById('auth-btn');
    const logoutBtn = document.getElementById('logout-btn');
    const historyBtn = document.getElementById('history-btn');
    const userInfo = document.getElementById('user-info');
    if (currentUser) {
      authBtn.style.display = 'none';
      logoutBtn.style.display = 'block';
      historyBtn.style.display = 'block';
      userInfo.textContent = currentUser.email;
    } else {
      authBtn.style.display = 'block';
      logoutBtn.style.display = 'none';
      historyBtn.style.display = 'none';
      userInfo.textContent = '';
    }
  }

  async function logout() {
    await sb.auth.signOut();
    showToast('Logged out. See you soon! 👋');
  }

  // ── CATEGORIES ──
  function renderCategories() {
    const el = document.getElementById('categories');
    el.innerHTML = CATS.map(c => `
      <button class="cat-btn ${c === activeCategory ? 'active' : ''}" onclick="filterCat('${c}')">${c}</button>
    `).join('');
  }

  function filterCat(cat) {
    activeCategory = cat;
    document.getElementById('section-label').textContent = cat === 'All' ? 'All Items' : cat;
    renderCategories();
    renderMenu();
  }

  // ── MENU ──
  function renderMenu() {
    const items = activeCategory === 'All' ? MENU : MENU.filter(m => m.cat === activeCategory);
    document.getElementById('menu-grid').innerHTML = items.map(item => {
      const qty = cart[item.id]?.qty || 0;
      return `
        <div class="food-card">
          <div class="food-emoji">${item.emoji}</div>
          <div>
            <div class="food-name">${item.name}</div>
            <div class="food-desc">${item.desc}</div>
          </div>
          <div class="food-footer">
            <div class="food-price">₹${item.price}</div>
            ${qty === 0
              ? `<button class="add-btn" onclick="addToCart(${item.id})">+</button>`
              : `<div class="qty-control">
                  <button onclick="decreaseCart(${item.id})">−</button>
                  <span class="qty-num">${qty}</span>
                  <button onclick="addToCart(${item.id})">+</button>
                </div>`
            }
          </div>
        </div>`;
    }).join('');
  }

  // ── CART ──
  function addToCart(id) {
    const item = MENU.find(m => m.id === id);
    if (!cart[id]) cart[id] = { ...item, qty: 0 };
    cart[id].qty++;
    updateCartBar();
    renderMenu();
  }

  function decreaseCart(id) {
    if (!cart[id]) return;
    cart[id].qty--;
    if (cart[id].qty <= 0) delete cart[id];
    updateCartBar();
    renderMenu();
  }

  function updateCartBar() {
    const items = Object.values(cart);
    const totalQty = items.reduce((s, i) => s + i.qty, 0);
    const totalPrice = items.reduce((s, i) => s + i.qty * i.price, 0);
    document.getElementById('cart-count').textContent = `${totalQty} item${totalQty !== 1 ? 's' : ''}`;
    document.getElementById('cart-total').textContent = totalPrice;
    const bar = document.getElementById('cart-bar');
    if (totalQty > 0) bar.classList.add('visible'); else bar.classList.remove('visible');
  }

  async function placeOrder() {
    if (!currentUser) { openAuth(); return; }
    const items = Object.values(cart).map(i => ({ name: i.name, emoji: i.emoji, price: i.price, qty: i.qty }));
    const total = items.reduce((s, i) => s + i.price * i.qty, 0);
    const { error } = await sb.from('orders').insert({
      user_id: currentUser.id,
      user_email: currentUser.email,
      items,
      total
    });
    if (error) { showToast('❌ Order failed. Try again.'); return; }
    cart = {};
    updateCartBar();
    renderMenu();
    showToast('🎉 Order placed! Check My Orders.');
  }

  // ── AUTH MODAL ──
  function openAuth() {
    document.getElementById('auth-overlay').classList.add('show');
    switchTab('login');
  }
  function closeAuth() { document.getElementById('auth-overlay').classList.remove('show'); }

  function switchTab(tab) {
    document.getElementById('panel-login').style.display = tab === 'login' ? 'block' : 'none';
    document.getElementById('panel-register').style.display = tab === 'register' ? 'block' : 'none';
    document.getElementById('tab-login').className = 'auth-tab' + (tab === 'login' ? ' active' : '');
    document.getElementById('tab-register').className = 'auth-tab' + (tab === 'register' ? ' active' : '');
    document.getElementById('login-msg').className = 'msg';
    document.getElementById('reg-msg').className = 'msg';
  }

  async function doLogin() {
    const email = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;
    const msg = document.getElementById('login-msg');
    if (!email || !password) { showMsg(msg, 'Email aur password dono bharo.', 'error'); return; }
    document.getElementById('login-loader').innerHTML = '<span class="spinner"></span>';
    const { error } = await sb.auth.signInWithPassword({ email, password });
    document.getElementById('login-loader').innerHTML = '';
    if (error) { showMsg(msg, error.message, 'error'); return; }
    closeAuth();
    showToast('✅ Login ho gaya! Ab order karo.');
  }

  async function doRegister() {
    const email = document.getElementById('reg-email').value.trim();
    const password = document.getElementById('reg-password').value;
    const confirm = document.getElementById('reg-confirm').value;
    const msg = document.getElementById('reg-msg');
    if (!email || !password) { showMsg(msg, 'Sab fields bharo.', 'error'); return; }
    if (password.length < 6) { showMsg(msg, 'Password kam se kam 6 characters ka hona chahiye.', 'error'); return; }
    if (password !== confirm) { showMsg(msg, 'Dono passwords match nahi kar rahe.', 'error'); return; }
    document.getElementById('reg-loader').innerHTML = '<span class="spinner"></span>';
    const { error } = await sb.auth.signUp({ email, password });
    document.getElementById('reg-loader').innerHTML = '';
    if (error) { showMsg(msg, error.message, 'error'); return; }
    showMsg(msg, '🎉 Account ban gaya! Ab login karo.', 'success');
    setTimeout(() => switchTab('login'), 1500);
  }

  // ── UTILS ──
  function showMsg(el, text, type) { el.textContent = text; el.className = `msg ${type}`; }
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3500);
  }

  // ── INIT ──
  renderCategories();
  renderMenu();
</script>
</body>
</html>
